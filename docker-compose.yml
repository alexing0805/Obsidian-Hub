services:
  obsidian-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: obsidian-hub:local
    container_name: obsidian-hub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - obsidian-hub-data:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/status', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  obsidian-hub-data:
