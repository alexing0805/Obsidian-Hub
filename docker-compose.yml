services:
  obsidian-hub:
    image: ghcr.io/alexing0805/obsidian-hub:latest
    container_name: obsidian-hub
    restart: unless-stopped
    volumes:
      - obsidian-hub-data:/app/backend
    networks:
      br0:
        ipv4_address: 192.168.100.51
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  br0:
    external: true

volumes:
  obsidian-hub-data:
